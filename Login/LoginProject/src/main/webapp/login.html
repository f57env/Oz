<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Login</title>

<style>

body{

background:#eeeeee;
font-family:Arial;

}

.box{

width:350px;
margin:70px auto;
background:white;
padding:25px;
border-radius:8px;

}

input{

width:100%;
padding:10px;
margin:10px 0;

}

button{

width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form action="login" method="post">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>Login</button>

</form>

</div>

</body>

</html>
