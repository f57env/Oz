<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Register</title>

<style>

body{

background:#f2f2f2;
font-family:Arial;

}

.box{

width:400px;
margin:40px auto;
background:white;
padding:25px;
border-radius:8px;

}

input{

width:100%;
padding:10px;
margin:10px 0;

}

button{

width:100%;
padding:12px;
background:green;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form action="register" method="post">

<input type="text"
name="name"
placeholder="Name"
required>

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<input type="text"
name="phone"
placeholder="Phone Number"
required>

<input type="number"
name="salary"
placeholder="Salary"
required>

<input type="text"
name="designation"
placeholder="Designation"
required>

<button>Create Account</button>

</form>

</div>

</body>

</html>
